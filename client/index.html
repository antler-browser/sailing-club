<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/antler-icon.webp" />
    <link rel="local-first-auth-manifest" href="/local-first-auth-manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sailing Club</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=DM+Serif+Display&display=swap" rel="stylesheet">
    <script>
      // Dynamically generate Smart App Banner with current page URL
      (function() {
        // Get current page URL
        const currentUrl = window.location.href;

        // URL-encode the current URL
        const encodedUrl = encodeURIComponent(currentUrl);

        // Create meta tag
        const meta = document.createElement('meta');
        meta.name = 'apple-itunes-app';
        meta.content = `app-id=6753969350, app-argument=https://antlerbrowser.com/open/${encodedUrl}`;

        // Add to head
        document.head.appendChild(meta);
      })();
    </script>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
